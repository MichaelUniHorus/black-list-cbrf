<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Black - Карта нелегальных кредиторов</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=b32b31d1-1157-4757-a682-66b6dbd87544&lang=ru_RU" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 380px;
            background: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s ease;
        }
        
        .sidebar.collapsed {
            width: 60px;
        }
        
        .sidebar.collapsed .sidebar-content,
        .sidebar.collapsed .stats-grid,
        .sidebar.collapsed .logo-text {
            display: none;
        }
        
        .sidebar.collapsed .logo {
            justify-content: center;
        }
        
        .sidebar.collapsed .logo-icon {
            margin: 0;
        }
        
        .toggle-btn {
            position: absolute;
            top: 24px;
            right: -12px;
            width: 24px;
            height: 24px;
            background: #dc2626;
            border: 2px solid #1e293b;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .toggle-btn:hover {
            background: #ef4444;
            transform: scale(1.1);
        }
        
        .sidebar-header {
            padding: 24px;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-bottom: 1px solid #334155;
            position: relative;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        
        .logo-text p {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            margin-top: 2px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 16px;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        
        .stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .org-card {
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .org-card:hover {
            background: #475569;
            border-color: #64748b;
            transform: translateY(-2px);
        }
        
        .org-card.active {
            background: #475569;
            border-color: #dc2626;
            box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.2);
        }
        
        .org-name {
            font-size: 14px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .org-address {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        
        .org-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .org-tag {
            font-size: 10px;
            padding: 4px 8px;
            background: rgba(220, 38, 38, 0.2);
            color: #fca5a5;
            border-radius: 4px;
        }
        
        .org-tag.warning {
            background: rgba(234, 179, 8, 0.2);
            color: #fde047;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .map-container {
            flex: 1;
            position: relative;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-content {
            text-align: center;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #334155;
            border-top-color: #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 16px;
            color: #94a3b8;
        }
        
        .error-message {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid #dc2626;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            text-align: center;
        }
        
        .error-title {
            font-size: 18px;
            font-weight: 600;
            color: #fca5a5;
            margin-bottom: 8px;
        }
        
        .error-text {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        
        .error-code {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #64748b;
            background: #1e293b;
            padding: 8px 12px;
            border-radius: 6px;
        }
        
        .empty-state {
            text-align: center;
            padding: 48px 24px;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 8px;
        }
        
        .empty-text {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        
        .empty-action {
            font-size: 12px;
            color: #64748b;
            background: #1e293b;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                max-height: 40vh;
            }
            
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="toggle-btn" id="toggle-btn" title="Свернуть/Развернуть">◀</button>
                <div class="logo">
                    <div class="logo-icon">🛡️</div>
                    <div class="logo-text">
                        <h1>Open Black</h1>
                        <p>Карта нелегальных кредиторов</p>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="total-orgs">-</div>
                        <div class="stat-label">Организаций</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="total-locations">-</div>
                        <div class="stat-label">Точек</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="coverage">-</div>
                        <div class="stat-label">Покрытие</div>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-content">
                <div class="section-title">Организации</div>
                <div id="org-list"></div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="map-container">
                <div id="map"></div>
                <div class="loading-overlay" id="loading">
                    <div class="loading-content">
                        <div class="spinner"></div>
                        <div class="loading-text">Загрузка данных...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8001/api';
        
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const stats = await response.json();
                
                document.getElementById('total-orgs').textContent = stats.total_organizations;
                document.getElementById('total-locations').textContent = stats.total_locations;
                document.getElementById('coverage').textContent = stats.coverage_percent + '%';
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }
        
        async function loadLocations() {
            try {
                const response = await fetch(`${API_URL}/locations?limit=1000&has_coordinates=true`);
                const locations = await response.json();
                return locations;
            } catch (error) {
                console.error('Ошибка загрузки локаций:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="error-message">
                        <div class="error-title">Ошибка подключения</div>
                        <div class="error-text">Убедитесь что backend запущен на http://localhost:8001</div>
                        <div class="error-code">POST ${API_URL}/admin/sync-cbr</div>
                    </div>
                `;
                return [];
            }
        }
        
        async function loadOrganizations() {
            try {
                const response = await fetch(`${API_URL}/organizations?limit=50`);
                const orgs = await response.json();
                return orgs;
            } catch (error) {
                console.error('Ошибка загрузки организаций:', error);
                return [];
            }
        }
        
        function renderOrganizations(orgs) {
            const list = document.getElementById('org-list');
            list.innerHTML = orgs.map(org => `
                <div class="org-card" data-org-id="${org.id}">
                    <div class="org-address">${org.legal_address || 'Адрес не указан'}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.org-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.org-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                });
            });
        }
        
        // Toggle sidebar
        document.getElementById('toggle-btn').addEventListener('click', () => {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('toggle-btn');
            sidebar.classList.toggle('collapsed');
            btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
        });
        
        async function initMap() {
            await loadStats();
            const locations = await loadLocations();
            const orgs = await loadOrganizations();
            
            renderOrganizations(orgs);
            
            ymaps.ready(function () {
                const map = new ymaps.Map('map', {
                    center: [55.76, 37.64],
                    zoom: 5,
                    controls: ['zoomControl', 'searchControl', 'typeSelector', 'fullscreenControl']
                });
                
                if (locations.length === 0) {
                    document.getElementById('loading').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <div class="empty-title">Нет данных</div>
                            <div class="empty-text">Запустите backend и загрузите данные из ЦБ РФ</div>
                            <div class="empty-action">POST ${API_URL}/admin/sync-cbr</div>
                        </div>
                    `;
                    return;
                }
                
                const clusterer = new ymaps.Clusterer({
                    preset: 'islands#redClusterIcons',
                    groupByCoordinates: false,
                    clusterDisableClickZoom: false,
                    clusterBalloonContentLayout: 'cluster#balloonTwoColumns'
                });
                
                const placemarks = locations.map(location => {
                    if (!location.latitude || !location.longitude) return null;
                    
                    return new ymaps.Placemark(
                        [location.latitude, location.longitude],
                        {
                            balloonContentHeader: `<strong>${location.address}</strong>`,
                            balloonContentBody: `
                                <div style="padding: 10px; color: #1e293b;">
                                    ${location.phone ? `<p style="margin: 8px 0;"><strong>📞</strong> ${location.phone}</p>` : ''}
                                    ${location.working_hours ? `<p style="margin: 8px 0;"><strong>🕐</strong> ${location.working_hours}</p>` : ''}
                                    <p style="margin: 8px 0; font-size: 12px; color: #64748b;">
                                        <strong>Источник:</strong> ${location.source}
                                    </p>
                                </div>
                            `
                        },
                        {
                            preset: 'islands#redDotIcon',
                            iconColor: '#dc2626'
                        }
                    );
                }).filter(Boolean);
                
                clusterer.add(placemarks);
                map.geoObjects.add(clusterer);
                
                if (placemarks.length > 0) {
                    map.setBounds(clusterer.getBounds(), {
                        checkZoomRange: true,
                        zoomMargin: 50
                    });
                }
                
                document.getElementById('loading').style.display = 'none';
            });
        }
        
        initMap();
    </script>
</body>
</html>
