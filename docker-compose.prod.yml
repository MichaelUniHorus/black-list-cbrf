version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

  frontend:
    build: 
      context: ./frontend
      args:
        VITE_API_URL: https://mikesdemos.ru/black-list/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  redis_data:
